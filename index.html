<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Boeklog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root {
    --ink:#1a1714;--ink2:#4a453f;--ink3:#9a928a;
    --paper:#faf8f4;--paper2:#f2ede5;--paper3:#e8e0d4;
    --accent:#b5491c;--accent2:#e8c49a;--gold:#c9973a;
    --r:10px;--shadow:0 2px 12px rgba(26,23,20,0.10);--shadow-lg:0 6px 32px rgba(26,23,20,0.15);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100vh}
  .auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .auth-card{background:white;border-radius:16px;box-shadow:var(--shadow-lg);padding:32px 28px;width:100%;max-width:380px}
  .auth-logo{font-family:'Playfair Display',serif;font-size:28px;letter-spacing:-0.5px;margin-bottom:6px}
  .auth-logo span{color:var(--accent);font-style:italic}
  .auth-sub{color:var(--ink3);font-size:13px;margin-bottom:28px}
  .auth-tabs{display:flex;margin-bottom:24px;border:1px solid var(--paper3);border-radius:8px;overflow:hidden}
  .auth-tab{flex:1;padding:9px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;border:none;cursor:pointer;background:transparent;color:var(--ink3);transition:all .15s}
  .auth-tab.active{background:var(--ink);color:white}
  .auth-msg{border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:12px;display:none}
  .auth-msg.show{display:block}
  .auth-msg.error{background:#fee8e8;color:#b00}
  .auth-msg.success{background:#e8f4e8;color:#2a6a2a}
  header{background:var(--ink);color:var(--paper);padding:18px 20px 14px;position:sticky;top:0;z-index:100}
  .header-row{display:flex;align-items:center;justify-content:space-between}
  .logo{font-family:'Playfair Display',serif;font-size:24px;letter-spacing:-0.5px}
  .logo span{color:var(--accent2);font-style:italic}
  .header-actions{display:flex;gap:8px;align-items:center}
  .icon-btn{background:rgba(255,255,255,0.1);border:none;color:var(--paper);width:38px;height:38px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s}
  .icon-btn:hover{background:rgba(255,255,255,0.18)}
  .user-pill{background:rgba(255,255,255,0.12);border-radius:20px;padding:5px 12px;font-size:12px;color:rgba(255,255,255,0.7);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#4caf50;display:inline-block;margin-right:4px;transition:background .3s}
  .sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite}
  .sync-dot.error{background:#e53}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .tabs{display:flex;background:var(--ink);padding:0 20px;border-bottom:1px solid rgba(255,255,255,0.08);overflow-x:auto}
  .tab{color:rgba(255,255,255,.5);font-size:13px;font-weight:500;padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
  .tab.active{color:var(--accent2);border-bottom-color:var(--accent2)}
  main{padding:16px 16px 100px;max-width:900px;margin:0 auto}
  .search-bar{display:flex;gap:8px;margin-bottom:12px}
  .search-input{flex:1;background:var(--paper2);border:1px solid var(--paper3);border-radius:var(--r);padding:10px 14px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--ink);outline:none;transition:border .15s}
  .search-input:focus{border-color:var(--accent)}
  .filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
  .filter-chip{background:var(--paper2);border:1px solid var(--paper3);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;transition:all .15s;color:var(--ink2);white-space:nowrap}
  .filter-chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  select.sort-select{background:var(--paper2);border:1px solid var(--paper3);border-radius:var(--r);padding:8px 12px;font-size:13px;color:var(--ink2);font-family:'DM Sans',sans-serif;cursor:pointer;outline:none}
  .books-grid{display:flex;flex-direction:column;gap:10px}
  .book-card{background:white;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .15s}
  .book-card:active{transform:scale(0.99)}
  .book-card:hover{box-shadow:var(--shadow-lg)}
  .card-inner{display:flex;gap:12px;padding:12px;align-items:flex-start}
  .book-cover{width:56px;min-width:56px;height:80px;border-radius:5px;background:var(--paper3);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .book-cover img{width:100%;height:100%;object-fit:cover}
  .book-meta{flex:1;min-width:0}
  .book-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;line-height:1.3;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .book-author{font-size:12px;color:var(--ink3);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .book-row2{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .genre-pill{background:var(--paper2);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--ink2)}
  .date-label{font-size:11px;color:var(--ink3)}
  .stars-mini{color:var(--gold);font-size:12px;letter-spacing:-1px}
  .card-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:52px}
  .rating-big{font-size:18px;font-weight:500;color:var(--gold)}
  .empty-state{text-align:center;padding:60px 20px;color:var(--ink3)}
  .empty-state .empty-icon{font-size:48px;margin-bottom:12px}
  .empty-state p{font-size:14px;line-height:1.6}
  .fab{position:fixed;bottom:24px;right:20px;background:var(--accent);color:white;border:none;width:56px;height:56px;border-radius:50%;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(181,73,28,.4);display:flex;align-items:center;justify-content:center;transition:transform .15s;z-index:200}
  .fab:active{transform:scale(0.95)}
  .modal-overlay{position:fixed;inset:0;background:rgba(26,23,20,.7);z-index:300;display:none;align-items:flex-end;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:var(--paper);width:100%;max-width:620px;border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;padding:20px 20px 40px;position:relative}
  @media(min-width:640px){.modal-overlay{align-items:center}.modal{border-radius:16px;max-height:85vh}}
  .modal-handle{width:40px;height:4px;background:var(--paper3);border-radius:2px;margin:0 auto 20px}
  .modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;margin-bottom:18px}
  .close-btn{position:absolute;top:16px;right:16px;background:var(--paper2);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
  .form-group{margin-bottom:14px}
  label{display:block;font-size:12px;font-weight:500;color:var(--ink2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
  input[type=text],input[type=date],input[type=email],input[type=password],textarea,select.form-select{width:100%;background:white;border:1px solid var(--paper3);border-radius:8px;padding:10px 12px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--ink);outline:none;transition:border .15s}
  input:focus,textarea:focus,select.form-select:focus{border-color:var(--accent)}
  textarea{resize:vertical;min-height:70px}
  .search-lookup{display:flex;gap:6px}
  .search-lookup input{flex:1}
  .btn{padding:10px 18px;border-radius:8px;border:none;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
  .btn-primary{background:var(--ink);color:white}
  .btn-primary:hover{background:var(--accent)}
  .btn-secondary{background:var(--paper2);color:var(--ink)}
  .btn-danger{background:#fee;color:#b00;border:1px solid #fcc}
  .btn-sm{padding:7px 12px;font-size:12px}
  .btn-row{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}
  .btn-full{width:100%;justify-content:center;display:flex}
  .star-rating{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
  .star-btn{background:none;border:none;cursor:pointer;font-size:24px;color:var(--paper3);transition:color .1s,transform .1s;padding:2px}
  .star-btn.filled{color:var(--gold)}
  .star-btn:hover{transform:scale(1.15)}
  .rating-value{font-size:13px;color:var(--ink3);margin-left:6px}
  .lookup-result{background:var(--paper2);border-radius:var(--r);padding:12px;margin-top:10px;display:none}
  .lookup-result.show{display:block}
  .lookup-book-row{display:flex;gap:12px;align-items:flex-start}
  .lookup-cover{width:50px;height:70px;object-fit:cover;border-radius:4px;background:var(--paper3);flex-shrink:0}
  .lookup-info{flex:1}
  .lookup-info strong{font-family:'Playfair Display',serif;font-size:14px;display:block;margin-bottom:2px}
  .lookup-info small{color:var(--ink3);font-size:12px;display:block}
  .lookup-summary{margin-top:8px;font-size:12px;color:var(--ink2);line-height:1.5;display:none}
  .lookup-toggle{font-size:11px;color:var(--accent);cursor:pointer;margin-top:4px;background:none;border:none;font-family:inherit}
  .lookup-actions{display:flex;gap:6px;margin-top:8px}
  .detail-cover{width:100px;height:140px;border-radius:8px;background:var(--paper3);display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden;flex-shrink:0}
  .detail-cover img{width:100%;height:100%;object-fit:cover;border-radius:8px}
  .detail-header{display:flex;gap:16px;margin-bottom:20px;align-items:flex-start}
  .detail-header-info{flex:1}
  .detail-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;line-height:1.3;margin-bottom:4px}
  .detail-author{color:var(--ink2);margin-bottom:8px}
  .detail-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .meta-pill{background:var(--paper2);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--ink2)}
  .detail-section{margin-bottom:16px}
  .detail-section-title{font-size:11px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .detail-review{background:var(--paper2);border-radius:8px;padding:12px;font-size:14px;line-height:1.6;font-style:italic}
  .summary-toggle{font-size:12px;color:var(--accent);cursor:pointer;background:none;border:none;font-family:inherit;margin-top:4px}
  .table-wrap{overflow-x:auto;background:white;border-radius:var(--r);box-shadow:var(--shadow)}
  .book-table{width:100%;border-collapse:collapse;font-size:13px}
  .book-table th{text-align:left;font-size:11px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px;padding:8px 10px;border-bottom:1px solid var(--paper3);white-space:nowrap}
  .book-table td{padding:9px 10px;border-bottom:1px solid var(--paper3);vertical-align:middle}
  .book-table tr:last-child td{border-bottom:none}
  .book-table tr:hover td{background:var(--paper2);cursor:pointer}
  .book-table .col-title{font-weight:500;max-width:160px}
  .book-table .col-title span,.book-table .col-author span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .book-table .col-author{color:var(--ink2);max-width:120px}
  .book-table .col-rating{color:var(--gold);white-space:nowrap}
  .book-table .col-genre,.book-table .col-lang,.book-table .col-year,.book-table .col-date{color:var(--ink3);white-space:nowrap}
  @media(max-width:500px){.book-table .hide-mobile{display:none}}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
  .stat-card{background:white;border-radius:var(--r);padding:14px;box-shadow:var(--shadow)}
  .stat-card .stat-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:600}
  .stat-card .stat-label{font-size:12px;color:var(--ink3);margin-top:2px}
  .stat-card.wide{grid-column:1/-1}
  .bar-chart{display:flex;flex-direction:column;gap:6px}
  .bar-row{display:flex;align-items:center;gap:8px}
  .bar-label{font-size:12px;color:var(--ink2);min-width:80px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .bar-track{flex:1;height:8px;background:var(--paper2);border-radius:4px;overflow:hidden}
  .bar-fill{height:100%;background:var(--accent);border-radius:4px}
  .bar-count{font-size:11px;color:var(--ink3);min-width:20px;text-align:right}
  .year-row{display:flex;align-items:flex-end;gap:4px;height:80px;margin-top:8px}
  .year-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
  .year-bar{background:var(--accent2);border-radius:3px 3px 0 0;width:100%;min-height:4px}
  .year-label{font-size:10px;color:var(--ink3)}
  .year-count{font-size:10px;color:var(--ink2);font-weight:500}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ink);color:white;padding:10px 18px;border-radius:20px;font-size:13px;z-index:500;opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap}
  .toast.show{opacity:1}
  .loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--ink3);font-size:14px}
  .spinner{width:28px;height:28px;border:2px solid var(--paper3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .sync-bar{font-size:12px;color:var(--ink3);padding:6px 2px 10px;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>

<div id="loadingScreen" class="loading-screen">
  <div class="spinner"></div><span>Laden...</span>
</div>

<div id="authScreen" class="auth-screen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">Boek<span>log</span></div>
    <div class="auth-sub">Jouw persoonlijke leesbibliotheek</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="authTabLogin">Inloggen</button>
      <button class="auth-tab" id="authTabRegister">Registreren</button>
    </div>
    <div class="auth-msg error" id="authError"></div>
    <div class="auth-msg success" id="authSuccess"></div>
    <div class="form-group"><label>E-mailadres</label><input type="email" id="authEmail" placeholder="jouw@email.nl" autocomplete="email"></div>
    <div class="form-group"><label>Wachtwoord</label><input type="password" id="authPassword" placeholder="Minimaal 6 tekens" autocomplete="current-password"></div>
    <button class="btn btn-primary btn-full" id="authSubmitBtn" style="margin-top:4px">Inloggen</button>
    <div style="text-align:center;margin-top:14px"><button style="background:none;border:none;font-size:12px;color:var(--ink3);cursor:pointer;font-family:inherit" id="forgotBtn">Wachtwoord vergeten?</button></div>
  </div>
</div>

<div id="appScreen" style="display:none">
  <header>
    <div class="header-row">
      <div class="logo">Boek<span>log</span></div>
      <div class="header-actions">
        <span class="user-pill" id="userPill"></span>
        <button class="icon-btn" id="statsBtn" title="Statistieken">📊</button>
        <button class="icon-btn" id="logoutBtn" title="Uitloggen" style="font-size:13px">&#x21A9;</button>
      </div>
    </div>
  </header>
  <div class="tabs">
    <div class="tab active" data-tab="library">Bibliotheek</div>
    <div class="tab" data-tab="table">Tabel</div>
    <div class="tab" data-tab="wishlist">Leeslijst</div>
  </div>
  <main>
    <div class="sync-bar"><span class="sync-dot" id="syncDot"></span><span id="syncLabel">Gesynchroniseerd</span></div>
    <div id="libraryTab">
      <div class="search-bar">
        <input class="search-input" id="searchInput" placeholder="Zoek op titel, auteur..." type="text">
        <select class="sort-select" id="sortSelect">
          <option value="date-desc">Nieuwst</option><option value="date-asc">Oudst</option>
          <option value="rating-desc">Hoogste &#9733;</option><option value="rating-asc">Laagste &#9733;</option>
          <option value="title">Titel A&#8211;Z</option>
        </select>
      </div>
      <div class="filter-row" id="genreFilters"></div>
      <div class="books-grid" id="booksGrid"></div>
    </div>
    <div id="tableTab" style="display:none">
      <div class="search-bar">
        <input class="search-input" id="tableSearchInput" placeholder="Zoek in tabel..." type="text">
        <select class="sort-select" id="tableSortSelect">
          <option value="date-desc">Nieuwst</option><option value="date-asc">Oudst</option>
          <option value="rating-desc">Hoogste &#9733;</option><option value="rating-asc">Laagste &#9733;</option>
          <option value="title">Titel A&#8211;Z</option>
        </select>
      </div>
      <div id="tableContainer"></div>
    </div>
    <div id="wishlistTab" style="display:none">
      <div class="search-bar"><input class="search-input" id="wishSearchInput" placeholder="Zoek in leeslijst..." type="text"></div>
      <div class="books-grid" id="wishGrid"></div>
    </div>
  </main>
  <button class="fab" id="addBtn">+</button>
</div>

<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="close-btn" id="closeAdd">&#x2715;</button>
    <div class="modal-title" id="addModalTitle">Boek toevoegen</div>
    <div class="form-group">
      <label>Zoek boek op titel, auteur of ISBN</label>
      <div class="search-lookup">
        <input type="text" id="lookupInput" placeholder="bijv. De Aanslag of Harry Potter...">
        <button class="btn btn-secondary btn-sm" id="lookupBtn">Zoeken</button>
        <button class="btn btn-secondary btn-sm" id="scanBtn" title="Scan barcode">📷</button>
      </div>
      <div id="scannerWrap" style="display:none;margin-top:10px;border-radius:10px;overflow:hidden;position:relative">
        <div id="scannerDiv"></div>
        <button id="stopScanBtn" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);border:none;color:white;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;z-index:10">✕</button>
        <div id="scanStatus" style="text-align:center;font-size:12px;color:var(--ink3);padding:6px">Richt de camera op de barcode...</div>
      </div>
      <div class="lookup-result" id="lookupResult"></div>
    </div>
    <div class="form-group"><label>Titel *</label><input type="text" id="fTitle" placeholder="Boektitel"></div>
    <div class="form-group"><label>Auteur *</label><input type="text" id="fAuthor" placeholder="Naam auteur"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div class="form-group"><label>Genre</label><input type="text" id="fGenre" placeholder="bijv. Roman"></div>
      <div class="form-group"><label>Taal</label><input type="text" id="fLang" placeholder="NL"></div>
      <div class="form-group"><label>Jaar</label><input type="text" id="fYear" placeholder="2024"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group"><label>Datum gelezen</label><input type="date" id="fDate"></div>
      <div class="form-group"><label>Status</label>
        <select class="form-select" id="fStatus">
          <option value="read">Gelezen &#10003;</option>
          <option value="reading">Aan het lezen</option>
          <option value="wishlist">Leeslijst</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Beoordeling</label>
      <div class="star-rating">
        <button class="star-btn" data-val="0.5">&#189;</button><button class="star-btn" data-val="1">&#9733;</button>
        <button class="star-btn" data-val="1.5">&#189;</button><button class="star-btn" data-val="2">&#9733;</button>
        <button class="star-btn" data-val="2.5">&#189;</button><button class="star-btn" data-val="3">&#9733;</button>
        <button class="star-btn" data-val="3.5">&#189;</button><button class="star-btn" data-val="4">&#9733;</button>
        <button class="star-btn" data-val="4.5">&#189;</button><button class="star-btn" data-val="5">&#9733;</button>
        <span class="rating-value" id="ratingVal">Geen</span>
      </div>
    </div>
    <div class="form-group"><label>Korte review</label><textarea id="fReview" placeholder="Wat vond je van dit boek?"></textarea></div>
    <input type="hidden" id="fCoverUrl"><input type="hidden" id="fIsbn">
    <input type="hidden" id="fSummary"><input type="hidden" id="fEditId">
    <div class="btn-row">
      <button class="btn btn-primary" id="saveBookBtn">Opslaan</button>
      <button class="btn btn-secondary" id="cancelAddBtn">Annuleren</button>
      <button class="btn btn-danger btn-sm" id="deleteBookBtn" style="display:none;margin-left:auto">Verwijderen</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="detailModal">
  <div class="modal"><div class="modal-handle"></div>
    <button class="close-btn" id="closeDetail">&#x2715;</button>
    <div id="detailContent"></div>
  </div>
</div>

<div class="modal-overlay" id="statsModal">

<script>
const SUPABASE_URL='https://faapjiesunsvdovjzeaj.supabase.co';
const SUPABASE_KEY='sb_publishable_tQo10TDLi60I59DBmLIjgA_AW582mlB';
const sb={
  h:{'apikey':SUPABASE_KEY,'Content-Type':'application/json'},
  aH(t){return{...this.h,'Authorization':'Bearer '+t}},
  async signUp(e,p){const r=await fetch(SUPABASE_URL+'/auth/v1/signup',{method:'POST',headers:this.h,body:JSON.stringify({email:e,password:p})});return r.json()},
  async signIn(e,p){const r=await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:this.h,body:JSON.stringify({email:e,password:p})});return r.json()},
  async signOut(t){await fetch(SUPABASE_URL+'/auth/v1/logout',{method:'POST',headers:this.aH(t)})},
  async resetPw(e){await fetch(SUPABASE_URL+'/auth/v1/recover',{method:'POST',headers:this.h,body:JSON.stringify({email:e})})},
  async getRow(t,uid){const r=await fetch(SUPABASE_URL+'/rest/v1/books?user_id=eq.'+uid+'&select=*',{headers:this.aH(t)});const d=await r.json();return Array.isArray(d)?d[0]:null},
  async getBooks(t,uid){return this.getRow(t,uid)},
  async refreshSession(refresh_token){
    try{
      const r=await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=refresh_token',{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY},body:JSON.stringify({refresh_token})});
      const d=await r.json();
      return d.access_token?d:null;
    }catch{return null;}
  },
  async upsert(t,uid,data){
    // Eerst checken of rij al bestaat
    const check=await fetch(SUPABASE_URL+'/rest/v1/books?user_id=eq.'+uid+'&select=user_id',{headers:this.aH(t)});

      // UPDATE
      const r=await fetch(SUPABASE_URL+'/rest/v1/books?user_id=eq.'+uid,{method:'PATCH',headers:{...this.aH(t),'Prefer':'return=minimal'},body:JSON.stringify({data:data})});
      return r.ok;

      const r=await fetch(SUPABASE_URL+'/rest/v1/books',{method:'POST',headers:{...this.aH(t),'Prefer':'return=minimal'},body:JSON.stringify({user_id:uid,data:data})});
      return r.ok;
    }
  }
};
let books=[],session=null,saveTimer=null,currentRating=0,activeTab='library',genreFilter='all';
function getSession(){try{return JSON.parse(localStorage.getItem('bl_sess'))}catch{return null}}
function setSession(s){session=s;if(s)s.tokenSetAt=Date.now();s?localStorage.setItem('bl_sess',JSON.stringify(s)):localStorage.removeItem('bl_sess')}
function setSyncStatus(state){const dot=document.getElementById('syncDot'),lbl=document.getElementById('syncLabel');if(!dot)return;dot.className='sync-dot'+(state==='syncing'?' syncing':state==='error'?' error':'');lbl.textContent=state==='syncing'?'Opslaan...':state==='error'?'Sync mislukt':'Gesynchroniseerd'}
async function loadFromCloud(){if(!session)return;try{const row=await sb.getRow(session.access_token,session.user.id);if(row&&Array.isArray(row.data)){books=row.data;localStorage.setItem('bl_local',JSON.stringify(books))}else{const loc=localStorage.getItem('bl_local');if(loc)books=JSON.parse(loc)}}catch{const loc=localStorage.getItem('bl_local');if(loc)books=JSON.parse(loc)}}
async function async saveToCloud(){
  if(!session)return;
  setSyncStatus('syncing');
  localStorage.setItem('bl_local',JSON.stringify(books));
  try{
    // Refresh token if needed
    const tokenAge = Date.now() - (session.tokenSetAt||0);
    if(tokenAge > 55*60*1000){ // refresh after 55 min
      const refreshed = await sb.refreshSession(session.refresh_token);
      if(refreshed && refreshed.access_token){ setSession(refreshed); }
    }
    const ok = await sb.upsert(session.access_token, session.user.id, books);
    if(ok){
      setSyncStatus('ok');
      // Verify by reading back
      const row = await sb.getBooks(session.access_token, session.user.id);
      if(row && Array.isArray(row.data) && row.data.length === books.length){
        setSyncStatus('ok');
      } else {
        setSyncStatus('error');
        toast('Sync verificatie mislukt, probeer opnieuw');
      }
    } else {
      setSyncStatus('error');
      toast('Opslaan mislukt — controleer verbinding');
    }
  }catch(e){
    setSyncStatus('error');
    toast('Sync fout: '+e.message);
  }
}

      else showMsg('error',m||'Inloggen mislukt. Probeer opnieuw.');
    } else {setSession(d);await startApp();return;}
  }
  btn.textContent=authMode==='login'?'Inloggen':'Account aanmaken';btn.disabled=false;});

function getFiltered(tab,sId,sortId){const q=(document.getElementById(sId)||{}).value?.toLowerCase()||'';const sort=(document.getElementById(sortId)||{}).value||'date-desc';let list=books.filter(b=>tab==='wishlist'?b.status==='wishlist':b.status!=='wishlist');if(genreFilter!=='all'&&tab==='library')list=list.filter(b=>b.genre===genreFilter);if(q)list=list.filter(b=>(b.title+b.author+(b.genre||'')+(b.lang||'')).toLowerCase().includes(q));list.sort((a,b)=>{if(sort==='date-desc')return(b.dateRead||'').localeCompare(a.dateRead||'');if(sort==='date-asc')return(a.dateRead||'').localeCompare(b.dateRead||'');if(sort==='rating-desc')return(b.rating||0)-(a.rating||0);if(sort==='rating-asc')return(a.rating||0)-(b.rating||0);if(sort==='title')return(a.title||'').localeCompare(b.title||'','nl');return 0});return list}

function renderTable(){const list=getFiltered('library','tableSearchInput','tableSortSelect');const container=document.getElementById('tableContainer');if(!container)return;if(!list.length){container.innerHTML='<div class="empty-state"><div class="empty-icon">📚</div><p>Geen boeken gevonden.</p></div>';return}container.innerHTML='<div class="table-wrap"><table class="book-table"><thead><tr><th>Titel</th><th class="hide-mobile">Auteur</th><th class="hide-mobile">Genre</th><th class="hide-mobile">Taal</th><th class="hide-mobile">Jaar</th><th>Gelezen</th><th>★</th><th style="width:32px"></th></tr></thead><tbody>'+list.map(b=>'<tr data-id="'+b.id+'"><td class="col-title"><span title="'+b.title+'">'+b.title+'</span></td><td class="col-author hide-mobile"><span title="'+b.author+'">'+b.author+'</span></td><td class="col-genre hide-mobile">'+(b.genre||'—')+'</td><td class="col-lang hide-mobile">'+(b.lang||'—')+'</td><td class="col-year hide-mobile">'+(b.pubYear||'—')+'</td><td class="col-date">'+(b.dateRead?b.dateRead.slice(0,7):'—')+'</td><td class="col-rating">'+(b.rating?b.rating+'★':'—')+'</td><td><button class="edit-table-btn" data-id="'+b.id+'" style="background:none;border:none;cursor:pointer;font-size:14px;color:var(--ink3);padding:2px 6px">✎</button></td></tr>').join('')+'</tbody></table></div>';container.querySelectorAll('tr[data-id]').forEach(row=>{row.addEventListener('click',e=>{if(e.target.closest('.edit-table-btn'))return;openDetail(row.dataset.id)})});container.querySelectorAll('.edit-table-btn').forEach(btn=>{btn.addEventListener('click',e=>{e.stopPropagation();openEdit(btn.dataset.id)})})}

ting':'&#9658; Toon samenvatting'})}

const langMap={nl:'NL',en:'EN',de:'DE',fr:'FR',es:'ES',it:'IT',pt:'PT',da:'DA',sv:'SV',no:'NO',fi:'FI',pl:'PL',ru:'RU',tr:'TR',ja:'JA',zh:'ZH',ar:'AR',ko:'KO'};
document.getElementById('lookupBtn').addEventListener('click',async()=>{const q=document.getElementById('lookupInput').value.trim();if(!q)return;const btn=document.getElementById('lookupBtn'),result=document.getElementById('lookupResult');btn.textContent='...';btn.disabled=true;result.classList.remove('show');try{const isIsbn=/^\d{10,13}$/.test(q.replace(/-/g,''));const query=isIsbn?'isbn:'+q.replace(/-/g,''):q;const res=await fetch('https://www.googleapis.com/books/v1/volumes?q='+encodeURIComponent(query)+'&maxResults=5&key=AIzaSyBiec0V2o8RXcop71NAdEFES19iJnoYph0');if(!res.ok)throw new Error('HTTP '+res.status);const data=await res.json();const items=(data.items||[]).slice(0,4);if(!items.length){result.innerHTML='<p style="font-size:13px;color:var(--ink3)">Geen resultaten. Probeer een andere zoekterm.</p>';result.classList.add('show');btn.textContent='Zoeken';btn.disabled=false;return}const found=items.map(item=>{const v=item.volumeInfo||{};const isbn13=(v.industryIdentifiers||[]).find(x=>x.type==='ISBN_13');const isbn10=(v.industryIdentifiers||[]).find(x=>x.type==='ISBN_10');const isbn=(isbn13||isbn10||{}).identifier||'';const lang=langMap[v.language||'']||(v.language||'').toUpperCase()||'';const coverUrl=v.imageLinks?(v.imageLinks.thumbnail||v.imageLinks.smallThumbnail||'').replace('http://','https:///'):'';let genre='';if(v.categories&&v.categories.length){const raw=v.categories[0].split('/')[0].trim();genre=genreMap[raw]||raw}return{title:v.title||'',author:(v.authors||[])[0]||'',pubYear:(v.publishedDate||'').slice(0,4),isbn,lang,genre,coverUrl,summary:v.description?v.description.slice(0,400)+(v.description.length>400?'…':''):'',pages:v.pageCount||''}});result.innerHTML=found.map((b,i)=>'<div class="lookup-book-row" style="'+(i>0?'margin-top:12px;padding-top:12px;border-top:1px solid var(--paper3)':'')+'">'+  (b.coverUrl?'<img class="lookup-cover" src="'+b.coverUrl+'" alt="">':'<div class="lookup-cover" style="display:flex;align-items:center;justify-content:center;font-size:20px">📖</div>')+'<div class="lookup-info"><strong>'+b.title+'</strong><small>'+b.author+(b.pubYear?' · '+b.pubYear:'')+(b.lang?' · '+b.lang:'')+(b.genre?' · '+b.genre:'')+'</small>'+(b.isbn?'<small>ISBN: '+b.isbn+'</small>':'')+(b.summary?'<div class="lookup-summary" id="lsum'+i+'">'+b.summary+'</div><button class="lookup-toggle" data-i="'+i+'">&#9658; Samenvatting</button>':'')+'<div class="lookup-actions"><button class="btn btn-primary btn-sm use-result" data-idx="'+i+'">Gebruik dit boek</button></div></div></div>').join('');result.classList.add('show');result._found=found;result.querySelectorAll('.lookup-toggle').forEach(btn=>{btn.addEventListener('click',()=>{const el=document.getElementById('lsum'+btn.dataset.i),shown=el.style.display==='block';el.style.display=shown?'none':'block';btn.innerHTML=shown?'&#9658; Samenvatting':'&#9660; Verberg'})});result.querySelectorAll('.use-result').forEach(btn=>{btn.addEventListener('click',()=>{const b=result._found[parseInt(btn.dataset.idx)];document.getElementById('fTitle').value=b.title;document.getElementById('fAuthor').value=b.author;document.getElementById('fGenre').value=b.genre||'';document.getElementById('fYear').value=b.pubYear||'';document.getElementById('fLang').value=b.lang||'';document.getElementById('fCoverUrl').value=b.coverUrl||'';document.getElementById('fIsbn').value=b.isbn||'';document.getElementById('fSummary').value=b.summary||'';result.classList.remove('show');toast('Boekinformatie ingevuld ✓')})})}catch(e){result.innerHTML='<p style="font-size:13px;color:var(--ink3)">Fout bij ophalen ('+e.message+').</p>';result.classList.add('show')}btn.textContent='Zoeken';btn.disabled=false});
document.getElementById('lookupInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('lookupBtn').click()});
function renderStats(){const read=books.filter(b=>b.status==='read'),yr=new Date().getFullYear();const rated=read.filter(b=>b.rating>0),avg=rated.length?(rated.reduce((s,b)=>s+b.rating,0)/rated.length).toFixed(1):'—';const yc={};read.forEach(b=>{if(b.dateRead){const y=b.dateRead.slice(0,4);yc[y]=(yc[y]||0)+1}});const years=Object.keys(yc).sort(),maxY=Math.max(...Object.values(yc),1);const gc={};read.forEach(b=>{if(b.genre)gc[b.genre]=(gc[b.genre]||0)+1});const tg=Object.entries(gc).sort((a,b)=>b[1]-a[1]).slice(0,6),maxG=tg.length?tg[0][1]:1;document.getElementById('statsContent').innerHTML='<div class="stats-grid"><div class="stat-card"><div class="stat-num">'+read.length+'</div><div class="stat-label">Gelezen boeken</div></div><div class="stat-card"><div class="stat-num">'+read.filter(b=>b.dateRead&&b.dateRead.startsWith(yr)).length+'</div><div class="stat-label">Dit jaar ('+yr+')</div></div><div class="stat-card"><div class="stat-num">'+avg+'</div><div class="stat-label">Gem. beoordeling</div></div><div class="stat-card"><div class="stat-num">'+books.filter(b=>b.status==='wishlist').length+'</div><div class="stat-label">Leeslijst</div></div>'+(years.length>1?'<div class="stat-card wide"><div class="stat-label" style="margin-bottom:8px">Boeken per jaar</div><div class="year-row">'+years.map(y=>'<div class="year-col"><div class="year-count">'+yc[y]+'</div><div class="year-bar" style="height:'+Math.max(8,Math.round((yc[y]/maxY)*60))+'px"></div><div class="year-label">'+y.slice(2)+'</div></div>').join('')+'</div></div>':'')+(tg.length?'<div class="stat-card wide"><div class="stat-label" style="margin-bottom:8px">Genres</div><div class="bar-chart">'+tg.map(([g,c])=>'<div class="bar-row"><div class="bar-label">'+g+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round((c/maxG)*100)+'%"></div></div><div class="bar-count">'+c+'</div></div>').join('')+'</div></div>':'')+'</div>'}

// ── BARCODE SCANNER ───────────────────────────────────────────
let scannerActive = false;
let html5Scanner = null;

document.getElementById('scanBtn').addEventListener('click', async () => {
  if (scannerActive) { stopScanner(); return; }
  const wrap = document.getElementById('scannerWrap');
  const status = document.getElementById('scanStatus');

  wrap.style.display = 'block';
  document.getElementById('scanBtn').textContent = '⏹';
  scannerActive = true;
  status.textContent = 'Camera starten...';

  try {
    html5Scanner = new Html5Qrcode('scannerDiv');
    await html5Scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 120 }, aspectRatio: 2.0, supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA] },
      (decodedText) => {
        // Only EAN-13/ISBN barcodes
        if (/^\d{10,13}$/.test(decodedText.replace(/-/g,''))) {
          status.textContent = '✓ Gevonden: ' + decodedText;
          stopScanner();
          document.getElementById('lookupInput').value = decodedText;
          document.getElementById('lookupBtn').click();
        }
      },
      () => { status.textContent = 'Richt op de barcode achterop het boek...'; }
    );
    status.textContent = 'Richt op de barcode achterop het boek...';
  } catch(e) {
    stopScanner();
    if (e.toString().includes('NotAllowedError') || e.toString().includes('Permission')) {
      toast('Camera toegang geweigerd — sta toe in browserinstellingen');
    } else {
      toast('Camera fout: ' + e);
    }
  }
});

document.getElementById('stopScanBtn').addEventListener('click', stopScanner);

async function stopScanner() {
  if (html5Scanner) {
    try { await html5Scanner.stop(); html5Scanner.clear(); } catch(e){}
    html5Scanner = null;
  }
  document.getElementById('scannerWrap').style.display = 'none';
  document.getElementById('scanBtn').textContent = '📷';
  scannerActive = false;
}

document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    saveToCloud();
  } else {
    // Reload from cloud when tab becomes visible again (switching devices)
    loadFromCloud().then(()=>{refreshCurrentView();});
  }
});
window.addEventListener('beforeunload',()=>saveToCloud());

// Poll every 30 seconds for changes from other devices
setInterval(async()=>{
  if(!session||document.hidden)return;
  const row=await sb.getBooks(session.access_token,session.user.id);
  if(row&&Array.isArray(row.data)){
    const remoteCount=row.data.length;
    const localCount=books.length;
    // Only update if data actually differs (simple length+last item check)
    const remoteStr=JSON.stringify(row.data.map(b=>b.id).sort());
    const localStr=JSON.stringify(books.map(b=>b.id).sort());
    if(remoteStr!==localStr){
      books=row.data;
      localStorage.setItem('bl_local',JSON.stringify(books));
      refreshCurrentView();
      toast('📚 Bibliotheek bijgewerkt');
    }
  }
},30000);
